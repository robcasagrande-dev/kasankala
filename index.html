<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kásankala | Prossima Apertura</title>
    <meta name="description" content="Kásankala: Un'esperienza culinaria unica e raffinata. Prossima apertura.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="background-image"></div>
    
    <main class="container">
        <header class="header animate-fade-in">
            <h1 class="logo">Kásankala</h1>
            <div class="subtitle">Ristorante & Lounge</div>
        </header>

        <section class="content animate-slide-up">
            <span class="badge">Coming Soon</span>
            <h2 class="title">L'Arte del Gusto,<br>Ridefinita.</h2>
            <p class="description">
                Stiamo preparando un'esperienza sensoriale indimenticabile. 
                Un intreccio di sapori esotici, eleganza moderna e atmosfera vibrante.
            </p>
            
            <form class="notify-form" id="notifyForm">
                <input type="email" placeholder="Il tuo indirizzo email" required class="email-input">
                <button type="submit" class="submit-btn">Avvisami</button>
            </form>
            <p class="form-message" id="formMessage"></p>
        </section>

        <footer class="footer animate-fade-in-delayed">
            <div class="social-links">
                <a href="#" aria-label="Instagram">Instagram</a>
                <a href="#" aria-label="Facebook">Facebook</a>
            </div>
            <p class="copyright">&copy; <span id="year"></span> Kásankala. Tutti i diritti riservati.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
